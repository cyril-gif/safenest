  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
  <style>
    :root {
      --bg:#070b18;--bg2:#0d1225;--bg3:#111828;--border:#1e2d4a;--border2:#243352;
      --accent:#3b82f6;--accent2:#06b6d4;--green:#10b981;--amber:#f59e0b;
      --pink:#ec4899;--red:#ef4444;--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
      --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;}
    #root{height:100%;display:flex;flex-direction:column;}
    button{font-family:var(--font);cursor:pointer;border:none;outline:none;}
    input,textarea{font-family:var(--font);outline:none;}
    input:focus,textarea:focus{border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(59,130,246,0.15)!important;}
    ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0.6}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes ripple{0%{transform:scale(0.8);opacity:1}100%{transform:scale(2.4);opacity:0}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn 0.3s ease forwards;}
    .leaflet-container{background:#0d1225!important;}
    .leaflet-tile{filter:brightness(0.92) saturate(0.75);}
    .nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);padding:4px 0 max(4px,env(safe-area-inset-bottom));flex-shrink:0;}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;color:var(--text3);font-size:10px;font-weight:700;letter-spacing:0.5px;transition:color 0.2s;position:relative;}
    .nav-btn.active{color:var(--accent);}
    .nav-btn .icon{font-size:20px;transition:transform 0.2s;}
    .nav-btn.active .icon{transform:scale(1.1);}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;}
    .card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;}
    .member-row{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;background:var(--bg3);border:1px solid var(--border);margin-bottom:8px;transition:all 0.2s;}
    .big-toggle{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:all 0.3s;-webkit-tap-highlight-color:transparent;user-select:none;position:relative;}
    .toggle-ripple{position:absolute;inset:-8px;border-radius:50%;animation:ripple 2s ease-out infinite;}
    .inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 14px;font-size:14px;font-family:var(--font);transition:border-color 0.2s,box-shadow 0.2s;}
    .inp::placeholder{color:var(--text3);}
    .lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:block;}
    .btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:11px;color:white;font-weight:800;font-size:14px;cursor:pointer;font-family:var(--font);letter-spacing:0.5px;transition:opacity 0.2s;}
    .btn-primary:disabled{opacity:0.4;cursor:default;}
    .btn-ghost{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;font-weight:700;padding:6px 14px;}
    .dot-live{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;display:inline-block;}
    .dot-off{width:7px;height:7px;border-radius:50%;background:var(--text3);display:inline-block;}
    .page{flex:1;overflow-y:auto;padding:16px;animation:fadeIn 0.25s ease;}
    .avatar-upload{position:relative;display:inline-block;cursor:pointer;}
    .avatar-upload input{display:none;}
    .avatar-upload-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:20px;opacity:0;transition:opacity 0.2s;}
    .avatar-upload:hover .avatar-upload-overlay,.avatar-upload:active .avatar-upload-overlay{opacity:1;}
    .tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;border:1px solid var(--border);margin-bottom:20px;}
    .tab{flex:1;padding:9px;border-radius:8px;border:none;font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer;transition:all 0.18s;background:transparent;color:var(--text3);}
    .tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;}
    .role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
    .role-card{padding:14px 8px;border-radius:12px;border:2px solid var(--border);background:transparent;color:var(--text3);font-weight:800;font-size:13px;cursor:pointer;font-family:var(--font);transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:4px;}
  </style>
</head>

const LS = {
  get:(k)=>{ try{return JSON.parse(localStorage.getItem("sn3_"+k));}catch{return null;} },
  set:(k,v)=>{ try{localStorage.setItem("sn3_"+k,JSON.stringify(v));}catch{} },
  del:(k)=>{ try{localStorage.removeItem("sn3_"+k);}catch{} },
};

const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,16);
const ROLES = ["father","son","girlfriend"];
const ROLE_META = {
  father:    {emoji:"👨",label:"Father",    color:"#f59e0b"},
  son:       {emoji:"👦",label:"Son",        color:"#3b82f6"},
  girlfriend:{emoji:"👩",label:"Girlfriend", color:"#ec4899"},
};

// ── Logo component using real photo ──────────────────────────────────────────
function AppLogo({ size=48, radius=14 }) {
  return (
    <div style={{width:size,height:size,borderRadius:radius,overflow:"hidden",border:"2px solid rgba(59,130,246,0.4)",boxShadow:"0 0 24px rgba(59,130,246,0.25)",flexShrink:0}}>
      <img src={APP_ICON} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} />
    </div>
  );
}

// ── Real Leaflet Map ──────────────────────────────────────────────────────────
function LiveMap({ members }) {
  const leafletRef = useRef(null);
  const markersRef = useRef({});

  useEffect(() => {
    if (leafletRef.current) return;
    const map = L.map("safenest-map", {
      center:[9.0,-2.5], zoom:8,
      zoomControl:false, attributionControl:false,
    });
    // Same tile style as screenshot — dark Carto with subtle colors
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_matter_nolabels/{z}/{x}/{y}{r}.png", {maxZoom:19}).addTo(map);
    // Add road labels as separate layer (matches screenshot style)
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_matter_only_labels/{z}/{x}/{y}{r}.png", {maxZoom:19,opacity:0.6}).addTo(map);
    L.control.zoom({position:"bottomright"}).addTo(map);
    leafletRef.current = map;
  }, []);

  useEffect(() => {
    const map = leafletRef.current;
    if (!map) return;
    const online = members.filter(m => m.online && m.lat);

    Object.keys(markersRef.current).forEach(role => {
      if (!online.find(m => m.role === role)) {
        map.removeLayer(markersRef.current[role]);
        delete markersRef.current[role];
      }
    });

    online.forEach(m => {
      const {color, label} = ROLE_META[m.role];
      const name = m.name || label;
      const html = `
        <div style="position:relative;width:20px;height:20px;">
          <div style="position:absolute;inset:-8px;border-radius:50%;border:2px solid ${color};animation:ripple 1.8s ease-out infinite;opacity:0.5;"></div>
          <div style="width:20px;height:20px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 0 12px ${color}90;"></div>
          <div style="position:absolute;top:24px;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:${color};padding:2px 7px;border-radius:5px;background:rgba(7,11,24,0.9);border:1px solid ${color}40;">${name.toUpperCase()}</div>
        </div>`;
      const icon = L.divIcon({html, className:"", iconSize:[20,20], iconAnchor:[10,10]});
      if (markersRef.current[m.role]) {
        markersRef.current[m.role].setLatLng([m.lat,m.lng]);
        markersRef.current[m.role].setIcon(icon);
      } else {
        markersRef.current[m.role] = L.marker([m.lat,m.lng],{icon}).addTo(map);
      }
    });

    if (online.length === 1) {
      map.setView([online[0].lat,online[0].lng], 15, {animate:true});
    } else if (online.length > 1) {
      map.fitBounds(online.map(m=>[m.lat,m.lng]), {padding:[60,60],animate:true,maxZoom:14});
    }
  }, [members]);

  return <div id="safenest-map" style={{width:"100%",height:"100%"}} />;
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [mode,setMode] = useState("login");
  const [role,setRole] = useState("father");
  const [name,setName] = useState("");
  const [code,setCode] = useState("");
  const [pass,setPass] = useState("");
  const [err,setErr] = useState("");
  const [busy,setBusy] = useState(false);

  const submit = async () => {
    setErr("");
    if (!name.trim()||!pass.trim()||!code.trim()) { setErr("Please fill in all fields."); return; }
    if (pass.length < 4) { setErr("Password must be at least 4 characters."); return; }
    setBusy(true);
    const room = slug(code);
    let users = await fbGet(`sn3/${room}/users`) || LS.get(`${room}_u`) || {};

    if (mode === "register") {
      if (Object.values(users).find(u=>u.role===role)) { setErr(`A ${role} is already registered. Log in instead.`); setBusy(false); return; }
      if (users[slug(name)]) { setErr("Name already taken."); setBusy(false); return; }
      const u = {name:name.trim(),role,pass,avatar:"",bio:"",createdAt:Date.now()};
      users[slug(name)] = u;
      await fbSet(`sn3/${room}/users`,users);
      LS.set(`${room}_u`,users);
      const sess = {name:u.name,role,room};
      LS.set("sess",sess); onAuth(sess);
    } else {
      const all = {...(LS.get(`${room}_u`)||{}),...users};
      const u = all[slug(name)];
      if (!u) { setErr("Account not found. Register first."); setBusy(false); return; }
      if (u.pass!==pass) { setErr("Incorrect password."); setBusy(false); return; }
      const sess = {name:u.name,role:u.role,room};
      LS.set("sess",sess); onAuth(sess);
    }
    setBusy(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",overflowY:"auto"}}>
      <div className="fade-in" style={{width:"100%",maxWidth:"400px"}}>
        <div style={{textAlign:"center",marginBottom:"28px"}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:"14px"}}>
            <div style={{width:"72px",height:"72px",borderRadius:"20px",overflow:"hidden",border:"3px solid rgba(59,130,246,0.5)",boxShadow:"0 0 40px rgba(59,130,246,0.3)"}}>
              <img src={APP_ICON} style={{width:"100%",height:"100%",objectFit:"cover"}} />
            </div>
          </div>
          <div style={{fontSize:"28px",fontWeight:"800",letterSpacing:"-0.5px"}}>SafeNest</div>
          <div style={{fontSize:"11px",color:"var(--text3)",fontWeight:"700",letterSpacing:"3px",marginTop:"4px"}}>FAMILY SAFETY NETWORK</div>
        </div>

        <div className="card" style={{padding:"28px"}}>
          <div className="tabs">
            <button className={`tab ${mode==="login"?"active":""}`} onClick={()=>{setMode("login");setErr("");}}>Log In</button>
            <button className={`tab ${mode==="register"?"active":""}`} onClick={()=>{setMode("register");setErr("");}}>Register</button>
          </div>

          {mode==="register" && <>
            <span className="lbl">I am the</span>
            <div className="role-grid">
              {ROLES.map(r => {
                const m=ROLE_META[r]; const active=role===r;
                return <button key={r} className="role-card" onClick={()=>setRole(r)}
                  style={{borderColor:active?m.color:"var(--border)",background:active?m.color+"18":"transparent",color:active?m.color:"var(--text3)"}}>
                  <span style={{fontSize:"24px"}}>{m.emoji}</span>{m.label}
                </button>;
              })}
            </div>
          </>}

          <span className="lbl">Family Code</span>
          <input className="inp" style={{marginBottom:"8px"}} placeholder='e.g. "cyrilfamily"' value={code} onChange={e=>setCode(e.target.value)} />
          <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"14px",lineHeight:"1.6",padding:"9px 12px",background:"var(--bg3)",borderRadius:"8px",border:"1px solid var(--border)"}}>
            📌 All family members must use the <strong style={{color:"var(--accent)"}}>same Family Code</strong> to connect across phones.
          </div>

          <span className="lbl">Your Name</span>
          <input className="inp" style={{marginBottom:"13px"}} placeholder="Enter your name" value={name} onChange={e=>setName(e.target.value)} />

          <span className="lbl">Password</span>
          <input className="inp" style={{marginBottom:"16px"}} type="password" placeholder="Min 4 characters" value={pass}
            onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} />

          {err && <div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:"9px",color:"#f87171",fontSize:"12px",fontWeight:"600",padding:"10px 13px",marginBottom:"14px"}}>⚠️ {err}</div>}

          <button className="btn-primary" onClick={submit} disabled={busy}>
            {busy?"Please wait…":mode==="register"?"Create Account →":"Log In →"}
          </button>
          <div style={{textAlign:"center",marginTop:"16px",fontSize:"13px",color:"var(--text3)"}}>
            {mode==="login"?"No account? ":"Already registered? "}
            <button style={{background:"none",border:"none",color:"var(--accent)",fontWeight:"800",cursor:"pointer",fontFamily:"var(--font)",fontSize:"13px"}}
              onClick={()=>{setMode(mode==="login"?"register":"login");setErr("");}}>
              {mode==="login"?"Register":"Log In"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function MainApp({ session, onLogout }) {
  const [tab,setTab] = useState("map");
  const [members,setMembers] = useState([]);
  const [myData,setMyData] = useState(null);
  const [sharing,setSharing] = useState(false);
  const [pending,setPending] = useState(false);
  const watchRef = useRef(null);
  const simRef = useRef(null);
  const simCoords = useRef(null);
  const activeRef = useRef(false);
  const meta = ROLE_META[session.role];

  useEffect(() => {
    const load = async () => {
      const users = await fbGet(`sn3/${session.room}/users`) || LS.get(`${session.room}_u`) || {};
      const u = users[slug(session.name)];
      if (u) setMyData(u);
    };
    load();
  }, [session]);

  useEffect(() => {
    const poll = async () => {
      const locs = await fbGet(`sn3/${session.room}/locs`) || {};
      const local = LS.get(`${session.room}_locs`) || {};
      const merged = {...local,...locs};
      const users = await fbGet(`sn3/${session.room}/users`) || LS.get(`${session.room}_u`) || {};
      const list = Object.entries(merged).map(([role,d]) => {
        const stale = Date.now()-(d.t||0)>20000;
        const u = Object.values(users).find(u=>u.role===role)||{};
        return {role,name:d.name||u.name||role,lat:d.lat,lng:d.lng,accuracy:d.accuracy,online:d.online&&!stale,avatar:u.avatar||"",t:d.t};
      });
      setMembers(list);
    };
    poll();
    const t = setInterval(poll,3000);
    return ()=>clearInterval(t);
  }, [session]);

  const pushLoc = useCallback(async (loc) => {
    const d = {...loc,online:true,name:session.name,t:Date.now()};
    const locs = LS.get(`${session.room}_locs`)||{};
    locs[session.role]=d; LS.set(`${session.room}_locs`,locs);
    await fbPatch(`sn3/${session.room}/locs`,{[session.role]:d});
  }, [session]);

  const stopSharing = useCallback(() => {
    activeRef.current=false;
    if (watchRef.current!=null){navigator.geolocation?.clearWatch(watchRef.current);watchRef.current=null;}
    if (simRef.current){clearInterval(simRef.current);simRef.current=null;}
    const off={online:false,name:session.name,t:Date.now()};
    const locs=LS.get(`${session.room}_locs`)||{};
    locs[session.role]=off; LS.set(`${session.room}_locs`,locs);
    fbPatch(`sn3/${session.room}/locs`,{[session.role]:off});
    setSharing(false); setPending(false);
  }, [session]);

  const startSim = useCallback(() => {
    const base={lat:9.98+(Math.random()-.5)*.02,lng:-2.47+(Math.random()-.5)*.02,accuracy:25};
    simCoords.current={...base};
    pushLoc(base); setSharing(true); setPending(false); activeRef.current=true;
    simRef.current=setInterval(()=>{
      if(!activeRef.current)return;
      simCoords.current.lat+=(Math.random()-.48)*.0005;
      simCoords.current.lng+=(Math.random()-.48)*.0005;
      pushLoc({...simCoords.current});
    },5000);
  },[pushLoc]);

  const toggleSharing = useCallback(() => {
    if (sharing||pending){stopSharing();return;}
    setPending(true);
    if (!navigator.geolocation){startSim();return;}
    const fb = setTimeout(()=>{if(!activeRef.current)startSim();},8000);
    watchRef.current = navigator.geolocation.watchPosition(
      (pos)=>{
        clearTimeout(fb);
        if(watchRef.current==null)return;
        const loc={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:Math.round(pos.coords.accuracy)};
        pushLoc(loc);
        if(!activeRef.current){activeRef.current=true;setSharing(true);setPending(false);}
      },
      ()=>{clearTimeout(fb);startSim();},
      {enableHighAccuracy:true,maximumAge:0,timeout:15000}
    );
  },[sharing,pending,stopSharing,startSim]);

  useEffect(()=>()=>stopSharing(),[stopSharing]);

  const onlineCount = members.filter(m=>m.online).length;

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>

      {/* MAP TAB */}
      {tab==="map" && (
        <div style={{flex:1,position:"relative",overflow:"hidden"}}>
          <LiveMap members={members} />

          {/* Header */}
          <div style={{position:"absolute",top:0,left:0,right:0,padding:"12px 16px",background:"linear-gradient(to bottom,rgba(7,11,24,0.96) 60%,transparent)",zIndex:500,display:"flex",alignItems:"center",gap:"10px",pointerEvents:"none"}}>
            <AppLogo size={36} radius={10} />
            <div style={{flex:1}}>
              <div style={{fontSize:"17px",fontWeight:"800",letterSpacing:"-0.3px"}}>SafeNest</div>
              <div style={{fontSize:"10px",color:"var(--text3)",fontFamily:"var(--mono)",marginTop:"1px"}}>{onlineCount} of {members.length||"—"} online</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"6px",background:"rgba(7,11,24,0.85)",border:"1px solid var(--border)",borderRadius:"10px",padding:"5px 11px",pointerEvents:"all"}}>
              <div style={{width:"7px",height:"7px",borderRadius:"50%",background:sharing?"var(--green)":pending?"var(--amber)":"var(--text3)",animation:sharing?"pulse 1.5s infinite":"none"}} />
              <span style={{fontSize:"10px",fontWeight:"700",color:sharing?"var(--green)":pending?"var(--amber)":"var(--text2)",fontFamily:"var(--mono)"}}>
                {sharing?"LIVE":pending?"WAIT...":"OFF"}
              </span>
            </div>
          </div>

          {/* FAB toggle */}
          <div style={{position:"absolute",bottom:"20px",left:"50%",transform:"translateX(-50%)",zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",gap:"8px"}}>
            <div onClick={toggleSharing} className="big-toggle"
              style={{background:sharing?`linear-gradient(135deg,${meta.color}28,${meta.color}0a)`:pending?"rgba(245,158,11,0.08)":"rgba(13,18,37,0.92)",border:`3px solid ${sharing?meta.color:pending?"var(--amber)":"var(--border2)"}`,boxShadow:sharing?`0 0 36px ${meta.color}50`:"0 8px 32px rgba(0,0,0,0.6)",backdropFilter:"blur(12px)"}}>
              {sharing && <div className="toggle-ripple" style={{borderColor:meta.color,opacity:0.3}} />}
              <span style={{fontSize:"34px"}}>{sharing?"📡":pending?"⏳":"📴"}</span>
              <span style={{fontSize:"9px",fontWeight:"800",letterSpacing:"2px",color:sharing?meta.color:pending?"var(--amber)":"var(--text3)"}}>
                {sharing?"SHARING":pending?"WAIT":"TAP"}
              </span>
            </div>
            <div style={{fontSize:"10px",color:"var(--text3)",fontFamily:"var(--mono)",background:"rgba(7,11,24,0.85)",padding:"4px 10px",borderRadius:"6px",border:"1px solid var(--border)",backdropFilter:"blur(8px)"}}>
              {sharing?"Tap to stop sharing":pending?"Getting location…":"Tap to share location"}
            </div>
          </div>
        </div>
      )}

      {/* FAMILY TAB */}
      {tab==="family" && (
        <div className="page">
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"4px"}}>
            <AppLogo size={32} radius={9} />
            <div style={{fontSize:"20px",fontWeight:"800"}}>Family</div>
          </div>
          <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"18px",fontFamily:"var(--mono)"}}>Room: {session.room}</div>

          {members.length===0 && (
            <div className="card" style={{padding:"32px",textAlign:"center"}}>
              <div style={{fontSize:"40px",marginBottom:"12px"}}>👨‍👩‍👦</div>
              <div style={{color:"var(--text2)",fontWeight:"600"}}>No family members connected yet</div>
              <div style={{color:"var(--text3)",fontSize:"12px",marginTop:"6px"}}>Others register with family code: <strong style={{color:"var(--accent)"}}>{session.room}</strong></div>
            </div>
          )}

          {ROLES.map(role => {
            const m=members.find(x=>x.role===role);
            const rm=ROLE_META[role]; const isMe=session.role===role;
            return (
              <div key={role} className="member-row" style={{borderColor:m?.online?rm.color+"50":"var(--border)"}}>
                <div style={{width:"44px",height:"44px",borderRadius:"50%",background:rm.color+"20",border:`2px solid ${m?.online?rm.color:"var(--border2)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",overflow:"hidden",flexShrink:0}}>
                  {m?.avatar?<img src={m.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} />:<span>{rm.emoji}</span>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
                    <span style={{fontWeight:"800",fontSize:"15px"}}>{m?.name||rm.label}</span>
                    {isMe&&<span style={{fontSize:"9px",background:"rgba(59,130,246,0.12)",color:"var(--accent)",border:"1px solid rgba(59,130,246,0.25)",borderRadius:"4px",padding:"1px 6px",fontWeight:"700"}}>YOU</span>}
                  </div>
                  <div style={{fontSize:"11px",color:rm.color,fontWeight:"700",marginTop:"2px"}}>{rm.label}</div>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",marginTop:"4px"}}>
                    {m?(m.online?<><div className="dot-live"/><span style={{fontSize:"10px",color:"var(--green)",fontFamily:"var(--mono)",fontWeight:"700"}}>LIVE</span>{m.accuracy&&<span style={{fontSize:"10px",color:"var(--text3)",fontFamily:"var(--mono)"}}>±{m.accuracy}m</span>}</>:<><div className="dot-off"/><span style={{fontSize:"10px",color:"var(--text3)",fontFamily:"var(--mono)"}}>OFFLINE</span>{m.t&&<span style={{fontSize:"10px",color:"var(--text3)",fontFamily:"var(--mono)"}}>· {new Date(m.t).toLocaleTimeString()}</span>}</>):<span style={{fontSize:"10px",color:"var(--text3)",fontFamily:"var(--mono)"}}>NOT REGISTERED</span>}
                  </div>
                </div>
                {m?.online&&m.lat&&<div style={{textAlign:"right",fontFamily:"var(--mono)",fontSize:"9px",color:"var(--text3)"}}><div>{m.lat.toFixed(4)}</div><div>{m.lng.toFixed(4)}</div></div>}
              </div>
            );
          })}
        </div>
      )}

      {/* SHARE TAB */}
      {tab==="share" && (
        <div className="page" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"calc(100vh - 130px)"}}>
          <AppLogo size={56} radius={16} />
          <div style={{textAlign:"center",margin:"16px 0 28px"}}>
            <div style={{fontSize:"22px",fontWeight:"800",color:meta.color}}>{session.name}</div>
            <div style={{fontSize:"12px",color:"var(--text3)",marginTop:"4px"}}>{meta.emoji} {meta.label}</div>
          </div>

          <div onClick={toggleSharing} className="big-toggle"
            style={{width:"160px",height:"160px",background:sharing?`radial-gradient(circle at 40% 40%,${meta.color}1a,var(--bg))`:pending?"rgba(245,158,11,0.05)":"var(--bg2)",border:`3px solid ${sharing?meta.color:pending?"var(--amber)":"var(--border2)"}`,boxShadow:sharing?`0 0 60px ${meta.color}40`:"none",marginBottom:"20px"}}>
            {sharing&&<div className="toggle-ripple" style={{borderColor:meta.color,opacity:0.25}} />}
            <span style={{fontSize:"52px",animation:pending?"spin 1s linear infinite":"none",display:"inline-block"}}>{sharing?"📡":pending?"⏳":"📴"}</span>
            <span style={{fontSize:"10px",fontWeight:"800",letterSpacing:"2px",color:sharing?meta.color:pending?"var(--amber)":"var(--text3)"}}>{sharing?"LIVE":pending?"WAIT":"OFF"}</span>
          </div>

          <div style={{fontSize:"18px",fontWeight:"800",color:sharing?meta.color:pending?"var(--amber)":"var(--text2)",marginBottom:"8px"}}>
            {sharing?"✅ Sharing Live":pending?"⏳ Starting…":"Location Off"}
          </div>
          <div style={{fontSize:"13px",color:"var(--text3)",textAlign:"center",maxWidth:"260px",lineHeight:"1.6",marginBottom:"24px"}}>
            {sharing?"Your location is being shared with your family. Tap to stop."
            :pending?"Requesting location access…"
            :"Tap the button to start sharing your live location."}
          </div>

          {sharing&&(
            <div className="card fade-in" style={{width:"100%",maxWidth:"300px",padding:"14px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                {[["STATUS","LIVE ●"],["FAMILY",session.room.toUpperCase()],["ROLE",meta.label.toUpperCase()],["MODE","PERSISTENT"]].map(([l,v])=>(
                  <div key={l} className="card-sm">
                    <div style={{fontSize:"8px",color:"var(--text3)",fontFamily:"var(--mono)",fontWeight:"700",letterSpacing:"1px"}}>{l}</div>
                    <div style={{fontSize:"11px",color:l==="STATUS"?meta.color:"var(--text)",fontWeight:"700",fontFamily:"var(--mono)",marginTop:"3px"}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* PROFILE TAB */}
      {tab==="profile" && <ProfileTab session={session} myData={myData} setMyData={setMyData} onLogout={onLogout} />}

      {/* NAV */}
      <nav className="nav">
        {[{id:"map",icon:"🗺️",label:"MAP"},{id:"family",icon:"👨‍👩‍👦",label:"FAMILY"},{id:"share",icon:"📡",label:"SHARE"},{id:"profile",icon:"👤",label:"ME"}].map(n=>(
          <button key={n.id} className={`nav-btn ${tab===n.id?"active":""}`} onClick={()=>setTab(n.id)}>
            <span className="icon">{n.id==="share"&&sharing?"🟢":n.icon}</span>
            <span>{n.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

// ── Profile ───────────────────────────────────────────────────────────────────
function ProfileTab({ session, myData, setMyData, onLogout }) {
  const [edit,setEdit] = useState(false);
  const [dname,setDname] = useState(myData?.name||session.name);
  const [bio,setBio] = useState(myData?.bio||"");
  const [avatar,setAvatar] = useState(myData?.avatar||"");
  const [saving,setSaving] = useState(false);
  const meta = ROLE_META[session.role];

  useEffect(()=>{
    if(myData){setDname(myData.name||session.name);setBio(myData.bio||"");setAvatar(myData.avatar||"");}
  },[myData]);

  const handleImg = (e) => {
    const file=e.target.files?.[0]; if(!file)return;
    if(file.size>600000){alert("Image too large, please use under 600KB");return;}
    const r=new FileReader();
    r.onload=(ev)=>setAvatar(ev.target.result);
    r.readAsDataURL(file);
  };

  const save = async () => {
    setSaving(true);
    const users=await fbGet(`sn3/${session.room}/users`)||LS.get(`${session.room}_u`)||{};
    const key=slug(session.name);
    if(users[key]){
      users[key]={...users[key],name:dname,bio,avatar};
      await fbSet(`sn3/${session.room}/users`,users);
      LS.set(`${session.room}_u`,users);
      setMyData(users[key]);
    }
    setSaving(false);setEdit(false);
  };

  return (
    <div className="page">
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"20px"}}>
        <AppLogo size={32} radius={9} />
        <div style={{fontSize:"20px",fontWeight:"800"}}>My Profile</div>
      </div>

      <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:"22px"}}>
        <label className="avatar-upload" style={{marginBottom:"10px"}}>
          <input type="file" accept="image/*" onChange={handleImg} />
          <div style={{width:"88px",height:"88px",borderRadius:"50%",background:meta.color+"20",border:`3px solid ${meta.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"40px",overflow:"hidden",position:"relative"}}>
            {avatar?<img src={avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} />:<span>{meta.emoji}</span>}
            <div className="avatar-upload-overlay">📷</div>
          </div>
        </label>
        <div style={{fontSize:"10px",color:"var(--text3)",marginBottom:"6px",fontFamily:"var(--mono)"}}>TAP TO CHANGE PHOTO</div>
        {edit
          ?<input className="inp" style={{maxWidth:"220px",textAlign:"center",fontSize:"17px",fontWeight:"800"}} value={dname} onChange={e=>setDname(e.target.value)} />
          :<div style={{fontSize:"22px",fontWeight:"800"}}>{dname}</div>}
        <div style={{display:"flex",alignItems:"center",gap:"6px",marginTop:"6px"}}>
          <span>{meta.emoji}</span>
          <span style={{fontSize:"13px",color:meta.color,fontWeight:"700"}}>{meta.label}</span>
        </div>
      </div>

      <div className="card" style={{padding:"16px",marginBottom:"12px"}}>
        <div style={{marginBottom:"14px"}}>
          <span className="lbl">Bio</span>
          {edit
            ?<textarea className="inp" rows={3} style={{resize:"none"}} value={bio} onChange={e=>setBio(e.target.value)} placeholder="Add a short note…" />
            :<div style={{fontSize:"13px",color:bio?"var(--text)":"var(--text3)",lineHeight:"1.6"}}>{bio||"No bio yet. Tap Edit to add one."}</div>}
        </div>
        <span className="lbl">Family Room</span>
        <div style={{fontFamily:"var(--mono)",fontSize:"14px",color:"var(--accent)",fontWeight:"700"}}>📡 {session.room}</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"18px"}}>
        {[["ROLE",meta.label,meta.color],["SINCE",myData?.createdAt?new Date(myData.createdAt).toLocaleDateString():"—","var(--text2)"]].map(([l,v,c])=>(
          <div key={l} className="card-sm">
            <div style={{fontSize:"9px",color:"var(--text3)",fontFamily:"var(--mono)",fontWeight:"700",letterSpacing:"1px"}}>{l}</div>
            <div style={{fontSize:"13px",color:c,fontWeight:"700",marginTop:"4px"}}>{v}</div>
          </div>
        ))}
      </div>

      {edit?(
        <div style={{display:"flex",gap:"10px",marginBottom:"12px"}}>
          <button className="btn-ghost" style={{flex:1,padding:"12px"}} onClick={()=>setEdit(false)}>Cancel</button>
          <button className="btn-primary" style={{flex:2}} onClick={save} disabled={saving}>{saving?"Saving…":"Save"}</button>
        </div>
      ):(
        <button className="btn-primary" style={{marginBottom:"12px"}} onClick={()=>setEdit(true)}>✏️ Edit Profile</button>
      )}

      <button onClick={onLogout} style={{width:"100%",padding:"13px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:"11px",color:"#f87171",fontWeight:"800",fontSize:"14px",fontFamily:"var(--font)"}}>
        Log Out
      </button>
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────────────────────
function App() {
  const [sess,setSess] = useState(()=>LS.get("sess"));
  if(!sess) return <AuthScreen onAuth={s=>setSess(s)} />;
  return <MainApp session={sess} onLogout={()=>{LS.del("sess");setSess(null);}} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
<\/script>
</body>
</html>
